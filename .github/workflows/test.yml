name: CI Vortex Cart

on:
  push:
    branches: [ main ]
  pull_request:
    branches: [ main ]

jobs:
  build-and-test:
    runs-on: ubuntu-latest

    services:
      postgres:
        image: postgres:15-alpine
        env:
          POSTGRES_USER: user_vortex
          POSTGRES_PASSWORD: password_vortex
          POSTGRES_DB: vortex_cart
        ports:
          - 5432:5432
        options: >-
          --health-cmd pg_isready
          --health-interval 10s
          --health-timeout 5s
          --health-retries 5

    steps:
      - uses: actions/checkout@v4

      - name: Use Node.js
        uses: actions/setup-node@v4
        with:
          node-version: '20'

      - name: Install dependencies
        run: npm install

      - name: Run Tests
        run: npm run test:ci
        env:
          DATABASE_URL: postgres://user_vortex:password_vortex@localhost:5432/vortex_cart
          NODE_ENV: test

      - name: Upload Test Metrics Artifact
        if: always()
        uses: actions/upload-artifact@v4
        with:
          name: jest-metrics
          path: reports/metrics.json

      - name: Notify n8n (Webhook)
        if: always()
        run: |
          curl -X POST "${{ secrets.N8N_WEBHOOK_URL }}" \
          -H "Content-Type: application/json" \
          -d '{
            "status": "${{ job.status }}",
            "repository": "${{ github.repository }}",
            "commit": "${{ github.sha }}",
            "report_path": "reports/metrics.json"
          }'