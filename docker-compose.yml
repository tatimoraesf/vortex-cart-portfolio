version: '3.8'

services:
  n8n:
    image: n8nio/n8n:latest
    ports:
      - "5678:5678"
    volumes:
      - n8n_data:/home/node/.n8n
    environment:
      - N8N_HOST=localhost
    networks:
      - vortex-net

  vortex-api:
    build: . 
    ports:
      - "3000:3000"
    environment:
      - DATABASE_URL=${DATABASE_URL}
      - NODE_ENV=${NODE_ENV}
      - N8N_WEBHOOK_URL=${N8N_WEBHOOK_URL}
      - ADMIN_API_KEY=${ADMIN_API_KEY}
    depends_on:
      - db
    volumes: 
      - .:/app
      - /app/node_modules
    command: npm run dev:watch
    networks:
      - vortex-net

  ngrok:
    image: ngrok/ngrok:latest
    command:
      - "http"
      - "n8n:5678"
    environment:
      - NGROK_AUTHTOKEN=${NGROK_AUTHTOKEN}
    ports:
      - "4040:4040"
    depends_on:
      - n8n
    networks:
      - vortex-net

  db:
    image: postgres:15-alpine
    container_name: vortex-db
    restart: always
    environment:
      POSTGRES_USER: user_vortex
      POSTGRES_PASSWORD: password_vortex
      POSTGRES_DB: vortex_cart
    ports:
      - "5432:5432"
    volumes:
      - postgres_data:/var/lib/postgresql/data
    networks: 
      - vortex-net

volumes:
  postgres_data:
  n8n_data:

networks:
  vortex-net:
    driver: bridge